<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niche Scout</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #000; --bg2: #1c1c1e; --bg3: #2c2c2e; --bg4: #3a3a3c;
    --border: rgba(255,255,255,0.08);
    --text: #fff; --text2: rgba(255,255,255,0.55); --text3: rgba(255,255,255,0.3);
    --accent: #0a84ff; --green: #30d158; --yellow: #ffd60a;
    --red: #ff453a; --orange: #ff9f0a; --purple: #bf5af2;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

  /* Sidebar */
  .sidebar { width: 232px; flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); height: 100vh; position: sticky; top: 0; display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 18px 14px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .sidebar-logo { display: flex; align-items: center; gap: 9px; margin-bottom: 3px; }
  .sidebar-logo-icon { width: 26px; height: 26px; border-radius: 6px; background: linear-gradient(135deg,#ff453a,#ff9f0a); display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .sidebar-logo-text { font-size: 13px; font-weight: 700; }
  .sidebar-subtitle { font-size: 10px; color: var(--text3); padding-left: 35px; }
  .sb-reports-section { flex-shrink: 0; border-bottom: 1px solid var(--border); }
  .sb-label { padding: 12px 14px 5px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text3); }
  .report-item { margin: 1px 7px; padding: 8px 10px; border-radius: 9px; cursor: pointer; transition: background .15s; display: flex; align-items: center; gap: 9px; }
  .report-item:hover { background: var(--bg3); }
  .report-item.active { background: var(--bg3); }
  .report-dot-wrap { width: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .report-dot { width: 6px; height: 6px; border-radius: 50%; background: transparent; }
  .report-item.active .report-dot { background: var(--accent); }
  .report-item-info { flex: 1; min-width: 0; }
  .report-item-date { font-size: 12px; font-weight: 600; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .report-item.active .report-item-date { color: var(--accent); }
  .report-item-meta { font-size: 10px; color: var(--text3); margin-top: 1px; }
  .report-arrow { font-size: 10px; color: var(--text3); flex-shrink: 0; transition: transform .2s; }
  .report-item.active .report-arrow { transform: rotate(90deg); color: var(--accent); }
  .sb-niches-section { flex: 1; overflow-y: auto; min-height: 0; padding-bottom: 8px; }
  .sb-niches-section::-webkit-scrollbar { width: 3px; }
  .sb-niches-section::-webkit-scrollbar-track { background: transparent; }
  .sb-niches-section::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
  .niche-list { display: none; }
  .niche-list.open { display: block; }
  .niche-list-header { padding: 10px 14px 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text3); display: flex; align-items: center; justify-content: space-between; }
  .niche-count-badge { background: var(--bg3); border-radius: 4px; padding: 1px 6px; font-size: 10px; font-weight: 700; color: var(--text3); }
  .niche-nav-item { margin: 1px 7px; padding: 7px 10px; border-radius: 9px; cursor: pointer; transition: background .15s; display: flex; align-items: center; gap: 8px; }
  .niche-nav-item:hover { background: var(--bg3); }
  .niche-nav-item.active { background: rgba(10,132,255,0.15); }
  .niche-nav-rank { width: 19px; height: 19px; border-radius: 5px; background: var(--bg4); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: var(--text3); flex-shrink: 0; }
  .niche-nav-item.active .niche-nav-rank { background: var(--accent); color: #fff; }
  .niche-nav-name { font-size: 12px; font-weight: 500; color: var(--text2); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .niche-nav-item.active .niche-nav-name { color: var(--text); font-weight: 600; }
  .niche-nav-score { font-size: 10px; font-weight: 700; color: var(--green); flex-shrink: 0; }

  /* Main */
  .main { flex: 1; overflow-y: auto; height: 100vh; }
  .topbar { background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 13px 26px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; }
  .topbar-left {}
  .topbar-title { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
  .topbar-meta { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .topbar-badges { display: flex; gap: 7px; align-items: center; }
  .tbadge { background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; padding: 3px 9px; font-size: 11px; color: var(--text2); font-weight: 500; }
  .content { padding: 20px 24px; }

  /* Banner */
  .banner { background: linear-gradient(135deg,#1c1c1e,#2c2c2e); border: 1px solid var(--border); border-radius: 16px; padding: 22px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
  .banner-title { font-size: 20px; font-weight: 800; letter-spacing: -.4px; margin-bottom: 3px; }
  .banner-sub { font-size: 12px; color: var(--text3); }
  .banner-stats { display: flex; gap: 22px; flex-shrink: 0; }
  .bstat { text-align: center; }
  .bstat-val { font-size: 24px; font-weight: 800; letter-spacing: -.5px; }
  .bstat-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-top: 1px; }

  .signals { display: flex; gap: 7px; margin-bottom: 20px; flex-wrap: wrap; }
  .signal { background: var(--bg2); border: 1px solid var(--border); border-radius: 9px; padding: 6px 11px; font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 5px; }
  .sec-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text3); margin-bottom: 9px; }

  /* Ranking table */
  .rtable { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .rhead { display: grid; grid-template-columns: 32px 1fr 64px 64px 64px 64px 84px 70px; padding: 7px 14px; gap: 5px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--text3); border-bottom: 1px solid var(--border); }
  .rrow { display: grid; grid-template-columns: 32px 1fr 64px 64px 64px 64px 84px 70px; padding: 10px 14px; align-items: center; gap: 5px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .15s; }
  .rrow:last-child { border-bottom: none; }
  .rrow:hover { background: var(--bg3); }
  .rbadge { width: 22px; height: 22px; border-radius: 5px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: var(--text3); }
  .rbadge.r1 { background: rgba(255,214,10,.15); color: var(--yellow); }
  .rnm { font-size: 12px; font-weight: 600; }
  .rcat { font-size: 10px; color: var(--text3); margin-top: 1px; }
  .sp { display: inline-flex; align-items: center; justify-content: center; padding: 2px 7px; border-radius: 5px; font-size: 11px; font-weight: 700; }
  .sg { background: rgba(48,209,88,.15); color: var(--green); }
  .sy { background: rgba(255,214,10,.1); color: var(--yellow); }
  .sr { background: rgba(255,69,58,.15); color: var(--red); }
  .cpmv { font-size: 11px; font-weight: 700; }
  .yp { display: inline-flex; align-items: center; gap: 3px; background: rgba(48,209,88,.15); color: var(--green); padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: 700; }

  /* Niche detail */
  .nd-back { display: inline-flex; align-items: center; gap: 6px; color: var(--accent); font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 16px; padding: 5px 0; }
  .nd-back:hover { opacity: .8; }
  .nd-header { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px 16px 0 0; padding: 20px 22px 17px; display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; }
  .nd-title { font-size: 17px; font-weight: 800; letter-spacing: -.4px; margin-bottom: 5px; }
  .nd-desc { font-size: 13px; color: var(--text2); line-height: 1.55; max-width: 500px; }
  .nd-why { font-size: 11px; color: var(--orange); margin-top: 6px; }
  .score-rings { display: flex; gap: 9px; flex-shrink: 0; }
  .sring { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .sring-c { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; }
  .sc-blue { background: rgba(10,132,255,.15); border: 2px solid rgba(10,132,255,.3); color: var(--accent); }
  .sc-green { background: rgba(48,209,88,.12); border: 2px solid rgba(48,209,88,.25); color: var(--green); }
  .sc-yellow { background: rgba(255,214,10,.1); border: 2px solid rgba(255,214,10,.2); color: var(--yellow); }
  .sring-lbl { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; font-weight: 600; }
  .nd-body { background: var(--bg2); border: 1px solid var(--border); border-top: none; display: grid; grid-template-columns: 1fr 1fr; }
  .nd-sec { padding: 15px 20px; border-bottom: 1px solid var(--border); }
  .nd-sec:nth-child(odd) { border-right: 1px solid var(--border); }
  .nd-sec.full { grid-column: 1/-1; }
  .nd-sec-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text3); margin-bottom: 8px; }
  .vi { display: flex; align-items: center; gap: 7px; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,.04); }
  .vi-rank { font-size: 10px; color: var(--text3); font-weight: 700; width: 13px; flex-shrink: 0; }
  .vi-title { font-size: 12px; font-weight: 500; flex: 1; line-height: 1.3; color: var(--text2); }
  .vi-views { font-size: 11px; font-weight: 700; color: var(--yellow); white-space: nowrap; }
  .chi { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.04); }
  .chi-av { width: 26px; height: 26px; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: #fff; }
  .chi-name { font-size: 12px; font-weight: 600; flex: 1; }
  .chi-meta { font-size: 10px; color: var(--text3); text-align: right; white-space: nowrap; }
  .tbar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .tbar-lbl { font-size: 11px; color: var(--text3); width: 38px; flex-shrink: 0; }
  .tbar-track { flex: 1; height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .tbar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--purple)); }
  .tbar-val { font-size: 11px; font-weight: 700; width: 32px; text-align: right; }
  .rq { display: flex; justify-content: space-between; padding: 3px 0; font-size: 11px; }
  .rq-n { color: var(--text2); } .rq-v { color: var(--green); font-weight: 700; }
  .mono-r { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,.04); }
  .mono-l { font-size: 11px; color: var(--text3); }
  .mono-v { font-size: 12px; font-weight: 700; }
  .mpill { padding: 2px 7px; border-radius: 5px; font-size: 10px; font-weight: 700; }
  .mhigh { background: rgba(48,209,88,.15); color: var(--green); }
  .mmed { background: rgba(255,214,10,.1); color: var(--yellow); }
  .mhard { background: rgba(255,69,58,.15); color: var(--red); }
  .angle-i { display: flex; gap: 7px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.04); font-size: 12px; line-height: 1.5; color: var(--text2); }
  .adot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); margin-top: 6px; flex-shrink: 0; }
  .vt-item { display: flex; gap: 7px; padding: 6px 9px; background: var(--bg3); border-radius: 7px; margin-bottom: 4px; font-size: 12px; line-height: 1.4; color: var(--text2); }
  .vt-num { color: var(--accent); font-weight: 700; font-size: 11px; flex-shrink: 0; margin-top: 1px; }
  .nd-footer { background: rgba(10,132,255,.04); border: 1px solid var(--border); border-top: 1px solid rgba(10,132,255,.12); border-radius: 0 0 16px 16px; padding: 18px 22px; }
  .nd-verdict { display: inline-flex; align-items: center; gap: 5px; background: rgba(48,209,88,.15); color: var(--green); padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; margin-bottom: 10px; }
  .nd-verdict.no { background: rgba(255,69,58,.15); color: var(--red); }
  .nd-rec { font-size: 13px; line-height: 1.65; color: var(--text2); }
  .nd-concept { margin-top: 10px; padding: 11px 13px; background: var(--bg3); border-radius: 9px; font-size: 12px; color: var(--text2); line-height: 1.6; }
  .stale-banner { background: rgba(255,159,10,.08); border: 1px solid rgba(255,159,10,.2); border-radius: 12px; padding: 12px 16px; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--orange); }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; color: var(--text3); text-align: center; gap: 12px; }
  .empty-state h2 { font-size: 18px; font-weight: 700; color: var(--text2); }
  .empty-state code { background: var(--bg3); padding: 4px 10px; border-radius: 6px; font-size: 13px; color: var(--accent); }
  .loading { display: flex; align-items: center; justify-content: center; height: 40vh; color: var(--text3); font-size: 14px; }
  .full-text { font-size: 12px; color: var(--text2); line-height: 1.6; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">📊</div>
      <div class="sidebar-logo-text">Niche Scout</div>
    </div>
    <div class="sidebar-subtitle">YouTube нише-разведчик</div>
  </div>
  <div class="sb-reports-section">
    <div class="sb-label">Отчёты</div>
    <div id="reports-list"></div>
    <div style="height:6px"></div>
  </div>
  <div class="sb-niches-section" id="niches-nav"></div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title" id="topbar-title">Niche Scout</div>
      <div class="topbar-meta" id="topbar-meta">Загрузка...</div>
    </div>
    <div class="topbar-badges" id="topbar-badges"></div>
  </div>
  <div class="content" id="content"><div class="loading">Загрузка отчётов...</div></div>
</div>

<script>
const state = { reports: [], currentReport: null, reportCache: {}, currentNiche: null };

function fmt(n) {
  if (!n && n !== 0) return '—';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(n);
}
function scoreClass(v) { return v >= 7 ? 'sg' : v >= 5 ? 'sy' : 'sr'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function avColor(i) { const c=['#0a84ff','#30d158','#ff9f0a','#bf5af2','#ff453a','#ffd60a']; return c[i%c.length]; }

async function boot() {
  const res = await fetch('/api/reports');
  state.reports = await res.json();
  renderReportsList();
  if (state.reports.length === 0) {
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <div style="font-size:48px">📭</div>
        <h2>Нет сохранённых отчётов</h2>
        <div>Запусти анализ чтобы создать первый отчёт:</div>
        <code>uv run main.py</code>
      </div>`;
    document.getElementById('topbar-meta').textContent = 'Нет отчётов';
    return;
  }
  await selectReport(state.reports[0].filename);
}

function renderReportsList() {
  const el = document.getElementById('reports-list');
  el.innerHTML = state.reports.map((r, i) => `
    <div class="report-item${i===0&&!state.currentReport?' active':''}" id="ri-${esc(r.filename)}" onclick="selectReport('${esc(r.filename)}')">
      <div class="report-dot-wrap"><div class="report-dot"></div></div>
      <div class="report-item-info">
        <div class="report-item-date">${esc(r.date_str)}</div>
        <div class="report-item-meta">${r.niche_count} ниш${nicheSuffix(r.niche_count)} · ${esc(r.region)} · ⭐ ${r.top_score}</div>
      </div>
      <div class="report-arrow">›</div>
    </div>`).join('');
}

function nicheSuffix(n) {
  if (n === 1) return 'а'; if (n>=2&&n<=4) return 'и'; return '';
}

async function selectReport(filename) {
  state.currentReport = filename;
  state.currentNiche = null;
  document.querySelectorAll('.report-item').forEach(el => el.classList.remove('active'));
  const ri = document.getElementById('ri-' + filename);
  if (ri) ri.classList.add('active');

  if (!state.reportCache[filename]) {
    document.getElementById('content').innerHTML = '<div class="loading">Загрузка...</div>';
    const res = await fetch('/api/reports/' + encodeURIComponent(filename));
    state.reportCache[filename] = await res.json();
  }

  const data = state.reportCache[filename];
  const meta = state.reports.find(r => r.filename === filename);
  renderNicheNav(data, filename);
  renderOverview(data, meta);
}

function renderNicheNav(data, filename) {
  const nav = document.getElementById('niches-nav');
  const niches = data.niches || [];
  nav.innerHTML = `
    <div class="niche-list open" id="nl-${esc(filename)}">
      <div class="niche-list-header"><span>Ниши</span><span class="niche-count-badge">${niches.length}</span></div>
      ${niches.map((nr, i) => {
        const a = nr.analysis || {};
        return `<div class="niche-nav-item" id="nn-${i}" onclick="showNiche(${i})">
          <div class="niche-nav-rank">${i+1}</div>
          <div class="niche-nav-name">${esc(a.niche_name||'')}</div>
          <div class="niche-nav-score">${a.overall_score||''}</div>
        </div>`;
      }).join('')}
    </div>`;
}

function renderOverview(data, meta) {
  const niches = data.niches || [];
  const raw = data.raw || {};
  const topScore = niches.length ? Math.max(...niches.map(n => n.analysis?.overall_score||0)) : 0;

  const staleBanner = meta && !meta.is_latest
    ? `<div class="stale-banner">⚠️ Архивный отчёт от <strong>${esc(meta.date_str)}</strong>. Запусти новый анализ для актуальных данных.</div>` : '';

  const signals = [
    ...(raw.google_trending||[]).slice(0,3).map(t=>`<div class="signal">📊 ${esc(t)}</div>`),
    ...(raw.reddit_hot||[]).slice(0,2).map(p=>`<div class="signal">🔴 ${esc((p.title||'').slice(0,40))} — ${p.score||0} pts</div>`),
    ...(raw.hn_front_page||[]).slice(0,2).map(p=>`<div class="signal">🔶 ${esc((p.title||'').slice(0,40))} — ${p.points||0} pts</div>`),
  ].join('');

  const rows = niches.map((nr, i) => {
    const a = nr.analysis || {};
    return `<div class="rrow" onclick="showNiche(${i})">
      <div class="rbadge${i===0?' r1':''}">${i+1}</div>
      <div><div class="rnm">${esc(a.niche_name||'')}</div><div class="rcat">${esc(a.category||'')}</div></div>
      <div><span class="sp ${scoreClass(a.overall_score)}">${a.overall_score||'—'}</span></div>
      <div><span class="sp ${scoreClass(a.opportunity_score)}">${a.opportunity_score||'—'}</span></div>
      <div><span class="sp ${scoreClass(10-(a.competition_score||5))}">${a.competition_score||'—'}</span></div>
      <div><span class="sp ${scoreClass(a.growth_score)}">${a.growth_score||'—'}</span></div>
      <div class="cpmv">$${a.estimated_cpm_min||0}–$${a.estimated_cpm_max||0}</div>
      <div>${a.worth_entering ? '<span class="yp">✓ Входить</span>' : '<span class="sp sr">Пропустить</span>'}</div>
    </div>`;
  }).join('');

  document.getElementById('topbar-title').textContent = `Отчёт · ${meta?.region||data.region||''}`;
  document.getElementById('topbar-meta').textContent = meta?.date_str || '';
  document.getElementById('topbar-badges').innerHTML = `
    <span class="tbadge">📍 ${esc(data.region||'')}</span>
    <span class="tbadge">🎯 ${niches.length} ниш</span>
    <span class="tbadge">⭐ ${topScore.toFixed(1)} топ</span>`;

  document.getElementById('content').innerHTML = `
    ${staleBanner}
    <div class="banner">
      <div>
        <div class="banner-title">YouTube нише-разведчик</div>
        <div class="banner-sub">Регион: ${esc(data.region||'')} · ${meta?.date_str||''}</div>
      </div>
      <div class="banner-stats">
        <div class="bstat"><div class="bstat-val" style="color:var(--accent)">${niches.length}</div><div class="bstat-lbl">Ниш найдено</div></div>
        <div class="bstat"><div class="bstat-val" style="color:var(--green)">${topScore.toFixed(1)}</div><div class="bstat-lbl">Топ скор</div></div>
        <div class="bstat"><div class="bstat-val" style="color:var(--yellow)">${(raw.trending_videos||[]).length||'—'}</div><div class="bstat-lbl">Видео</div></div>
      </div>
    </div>
    ${signals ? `<div class="signals">${signals}</div>` : ''}
    <div class="sec-lbl">Рейтинг ниш</div>
    <div class="rtable">
      <div class="rhead"><div>#</div><div>Ниша</div><div>Общий</div><div>Потенц.</div><div>Конкур.</div><div>Рост</div><div>CPM</div><div>Вердикт</div></div>
      ${rows}
    </div>`;
}

function showNiche(idx) {
  state.currentNiche = idx;
  document.querySelectorAll('.niche-nav-item').forEach((el,i) => el.classList.toggle('active', i===idx));

  const data = state.reportCache[state.currentReport];
  const nr = data.niches[idx];
  const a = nr.analysis || {};
  const s = nr.stats || {};
  const videos = nr.top_videos || [];
  const channels = nr.top_channels || [];
  const trends = nr.trends;

  const scoreRings = `
    <div class="score-rings">
      <div class="sring"><div class="sring-c sc-blue">${a.overall_score||'—'}</div><div class="sring-lbl">Общий</div></div>
      <div class="sring"><div class="sring-c sc-green">${a.opportunity_score||'—'}</div><div class="sring-lbl">Потенц.</div></div>
      <div class="sring"><div class="sring-c sc-yellow">${a.competition_score||'—'}</div><div class="sring-lbl">Конкур.</div></div>
    </div>`;

  const videosHtml = videos.slice(0,8).map((v,i) => `
    <div class="vi">
      <div class="vi-rank">${i+1}</div>
      <div class="vi-title">${esc(v.title||'')}</div>
      <div class="vi-views">${fmt(v.view_count)}</div>
    </div>`).join('');

  const channelsHtml = channels.slice(0,6).map((c,i) => `
    <div class="chi">
      <div class="chi-av" style="background:${avColor(i)}">${esc((c.title||'?')[0])}</div>
      <div class="chi-name">${esc(c.title||'')}</div>
      <div class="chi-meta">${fmt(c.subscriber_count)} подп.</div>
    </div>`).join('');

  const trendsHtml = trends ? `
    <div class="tbar-row"><div class="tbar-lbl">30д</div><div class="tbar-track"><div class="tbar-fill" style="width:${Math.min(100,trends.interest_30d||0)}%"></div></div><div class="tbar-val">${trends.interest_30d||0}</div></div>
    <div class="tbar-row"><div class="tbar-lbl">90д</div><div class="tbar-track"><div class="tbar-fill" style="width:${Math.min(100,trends.interest_90d||0)}%"></div></div><div class="tbar-val">${trends.interest_90d||0}</div></div>
    <div class="tbar-row"><div class="tbar-lbl">Рост</div><div class="tbar-track"><div class="tbar-fill" style="width:${Math.min(100,Math.max(0,(trends.growth_30d||0)+50))}%"></div></div><div class="tbar-val">${(trends.growth_30d||0)>0?'+':''}${(trends.growth_30d||0).toFixed(0)}%</div></div>
    ${(trends.rising_queries||[]).slice(0,4).map(q=>`<div class="rq"><span class="rq-n">${esc(q.query||'')}</span><span class="rq-v">+${q.value||0}%</span></div>`).join('')}
  ` : '<div style="color:var(--text3);font-size:12px">Нет данных</div>';

  const monoHtml = `
    <div class="mono-r"><span class="mono-l">CPM диапазон</span><span class="mono-v">$${a.estimated_cpm_min||0} – $${a.estimated_cpm_max||0}</span></div>
    <div class="mono-r"><span class="mono-l">Спонсоры</span><span class="mono-v"><span class="mpill mhigh">${esc(a.sponsor_potential||'—')}</span></span></div>
    <div class="mono-r"><span class="mono-l">Вход</span><span class="mono-v"><span class="mpill ${a.barrier_to_entry==='Easy'?'mhigh':a.barrier_to_entry==='Hard'||a.barrier_to_entry==='Very Hard'?'mhard':'mmed'}">${esc(a.barrier_to_entry||'—')}</span></span></div>
    <div class="mono-r"><span class="mono-l">Медиана просм.</span><span class="mono-v">${fmt(s.median_views)}</span></div>
    <div class="mono-r"><span class="mono-l">Видео найдено</span><span class="mono-v">${s.total_videos||0}</span></div>`;

  const anglesHtml = (a.content_angles||[]).map(ang=>`<div class="angle-i"><div class="adot"></div><div>${esc(ang)}</div></div>`).join('');
  const videosListHtml = (a.first_10_videos||[]).slice(0,10).map((t,i)=>`<div class="vt-item"><div class="vt-num">#${i+1}</div><div>${esc(t)}</div></div>`).join('');

  const extraSections = [
    a.viral_patterns ? `<div class="nd-sec full"><div class="nd-sec-title">🔥 Вирусные паттерны</div><div class="full-text">${esc(a.viral_patterns)}</div></div>` : '',
    a.audience_profile ? `<div class="nd-sec full"><div class="nd-sec-title">👥 Аудитория</div><div class="full-text">${esc(a.audience_profile)}</div></div>` : '',
    a.top_channel_analysis ? `<div class="nd-sec full"><div class="nd-sec-title">🔬 Анализ конкурентов</div><div class="full-text">${esc(a.top_channel_analysis)}</div></div>` : '',
    a.monetization_breakdown ? `<div class="nd-sec full"><div class="nd-sec-title">💰 Монетизация</div><div class="full-text">${esc(a.monetization_breakdown)}</div></div>` : '',
  ].join('');

  const meta = state.reports.find(r => r.filename === state.currentReport);
  document.getElementById('topbar-title').textContent = esc(a.niche_name||'Ниша');
  document.getElementById('topbar-meta').textContent = `#${idx+1} · ${meta?.date_str||''}`;
  document.getElementById('topbar-badges').innerHTML = `
    <span class="tbadge">📍 ${esc(data.region||'')}</span>
    <span class="tbadge sp ${scoreClass(a.overall_score)}">⭐ ${a.overall_score||'?'}</span>`;

  document.getElementById('content').innerHTML = `
    <div class="nd-back" onclick="backToOverview()">‹ Все ниши</div>
    <div class="nd-header">
      <div>
        <div class="nd-title">${esc(a.niche_name||'')}</div>
        <div class="nd-desc">${esc(a.niche_description||'')}</div>
        ${a.why_trending_now ? `<div class="nd-why">🔥 ${esc(a.why_trending_now)}</div>` : ''}
      </div>
      ${scoreRings}
    </div>
    <div class="nd-body">
      <div class="nd-sec"><div class="nd-sec-title">🏆 Топ видео</div>${videosHtml}</div>
      <div class="nd-sec"><div class="nd-sec-title">👥 Конкуренты</div>${channelsHtml}</div>
      <div class="nd-sec"><div class="nd-sec-title">📈 Google Trends</div>${trendsHtml}</div>
      <div class="nd-sec"><div class="nd-sec-title">💰 Монетизация</div>${monoHtml}</div>
      <div class="nd-sec full"><div class="nd-sec-title">🎯 Незакрытые углы</div>${anglesHtml}</div>
      ${videosListHtml ? `<div class="nd-sec full"><div class="nd-sec-title">🎬 Первые видео</div>${videosListHtml}</div>` : ''}
      ${extraSections}
    </div>
    <div class="nd-footer">
      <div class="nd-verdict${a.worth_entering?'':' no'}">${a.worth_entering ? '✅ Стоит входить' : '⚠️ С оговорками'}</div>
      <div class="nd-rec">${esc(a.recommendation||'')}</div>
      ${a.strategy ? `<div class="nd-concept"><strong>Стратегия:</strong> ${esc(a.strategy)}</div>` : ''}
      ${a.channel_concept ? `<div class="nd-concept" style="margin-top:6px"><strong>Концепция канала:</strong> ${esc(a.channel_concept)}</div>` : ''}
    </div>`;
}

function backToOverview() {
  state.currentNiche = null;
  document.querySelectorAll('.niche-nav-item').forEach(el => el.classList.remove('active'));
  const data = state.reportCache[state.currentReport];
  const meta = state.reports.find(r => r.filename === state.currentReport);
  renderOverview(data, meta);
}

boot();
</script>
</body>
</html>
